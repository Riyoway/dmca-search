<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>404 — No such record</title>
  <meta name="robots" content="noindex">
  <link rel="icon" type="image/png" href="/favicon.png">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=IBM+Plex+Mono:wght@400;500&display=swap">
  <style>
    :root {
      --paper: #f4efe3;
      --ink: #211d17;
      --muted: #857c6b;
      --stamp: #a32318;
      --wash: #e9e1cd;
      --serif: "Instrument Serif", "Times New Roman", Georgia, serif;
      --mono: "IBM Plex Mono", ui-monospace, SFMono-Regular, Menlo, monospace;
    }
    @media (prefers-color-scheme: dark) {
      :root { --paper: #14120d; --ink: #e7ded0; --muted: #8a8171; --stamp: #dd5647; --wash: #221d15; }
    }
    * { box-sizing: border-box; }
    html { background: var(--paper); }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-content: center;
      justify-items: center;
      gap: 0.4rem;
      padding: 2rem 1.25rem 4rem;
      text-align: center;
      background:
        linear-gradient(var(--paper), var(--paper)),
        repeating-linear-gradient(0deg, transparent 0 27px, rgba(33, 29, 23, 0.025) 27px 28px);
      color: var(--ink);
      font-family: var(--mono);
    }
    .kicker {
      margin: 0;
      font-size: 0.72rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .face {
      margin: 0.2rem 0;
      font-family: "Apple SD Gothic Neo", "Malgun Gothic", "Noto Sans KR", system-ui, var(--serif);
      font-size: clamp(3.4rem, 17vw, 11rem);
      line-height: 1;
      letter-spacing: 0.02em;
      color: var(--stamp);
      white-space: nowrap;
    }
    h1 {
      margin: 0.6rem 0 0;
      font-family: var(--serif);
      font-weight: 400;
      font-size: clamp(2rem, 6vw, 3.2rem);
      line-height: 1.05;
    }
    h1 em { font-style: italic; color: var(--stamp); }
    p.note {
      margin: 0.75rem 0 0;
      max-width: 30rem;
      font-family: var(--serif);
      font-size: 1.15rem;
      line-height: 1.4;
      color: var(--muted);
    }
    .home {
      margin-top: 1.9rem;
      display: inline-block;
      padding: 0.5rem 1.4rem;
      border: 1px solid var(--ink);
      border-radius: 2px;
      color: var(--ink);
      text-decoration: none;
      font-size: 0.78rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }
    .home:hover { background: var(--wash); }
    .stamp {
      position: fixed;
      top: 1.4rem;
      right: 1.4rem;
      display: grid;
      place-items: center;
      gap: 0.05rem;
      padding: 0.5rem 0.9rem;
      border: 2px solid var(--stamp);
      border-radius: 4px;
      color: var(--stamp);
      transform: rotate(9deg);
      opacity: 0.62;
      pointer-events: none;
      mix-blend-mode: multiply;
    }
    .stamp b { font-family: var(--serif); font-weight: 400; font-size: 1.05rem; line-height: 1; }
    .stamp span { font-size: 0.5rem; letter-spacing: 0.2em; text-transform: uppercase; }
    @media (prefers-color-scheme: dark) { .stamp { mix-blend-mode: screen; } }
    @media (max-width: 30rem) { .stamp { display: none; } }
  </style>
</head>
<body>
  <div class="stamp" aria-hidden="true"><b>Not on File</b><span>§ 512</span></div>

  <p class="kicker">Error 404 &middot; no such record</p>
  <p class="face" role="img" aria-label="a startled clerk">( ˶°ㅁ°) !!</p>
  <h1>This notice was <em>never filed</em>.</h1>
  <p class="note">Nothing at this address in the register. It may have been retracted, mistyped, or never existed at all.</p>
  <a class="home" href="/">&larr; back to the register</a>
</body>
</html>
