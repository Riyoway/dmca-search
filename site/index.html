<!doctype html>
<html lang="en" data-doc="script" data-md="hand" data-view="list">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>DMCA Takedown Register — Search</title>
  <meta name="description" content="Search GitHub's public register of DMCA takedown notices, counter notices, retractions and reversals.">
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="apple-touch-icon" href="icon.png">
  <meta property="og:title" content="DMCA Takedown Register">
  <meta property="og:description" content="Search GitHub's public register of DMCA takedown notices.">
  <meta property="og:image" content="https://dmca-search.riyo.me/icon.png">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;500;600;700&family=Instrument+Serif:ital@0;1&family=IBM+Plex+Mono:wght@400;500;600&display=swap">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="stamp" aria-hidden="true">
    <span>Public Record</span>
    <span>§ 512 · DMCA</span>
  </div>

  <header>
    <div class="letterhead">
      <div class="seal" aria-hidden="true">§512</div>
      <div class="letterhead-text">
        <p class="kicker">github/dmca &middot; digital millennium copyright act</p>
        <h1>Takedown <em>Register</em></h1>
        <p class="sub">A searchable index of every notice filed to GitHub&rsquo;s public archive.</p>
      </div>
    </div>
    <p class="stats" id="stats">opening the register&hellip;</p>
  </header>

  <main>
    <form class="searchbar" id="searchbar" role="search" autocomplete="off">
      <span class="prompt" aria-hidden="true">re:</span>
      <label class="visually-hidden" for="q">Search the register</label>
      <input id="q" type="search" name="q" placeholder="search the register&hellip;" spellcheck="false" autofocus>
      <kbd title="Press / to search">/</kbd>
    </form>

    <div class="filters">
      <div class="field">
        <span class="field-label">Filed</span>
        <div class="select" id="yearSelect">
          <button type="button" class="select-btn" id="yearBtn" aria-haspopup="listbox" aria-expanded="false">
            <span class="select-value" id="yearValue">All years</span>
            <span class="select-caret" aria-hidden="true"></span>
          </button>
          <ul class="select-list" id="yearList" role="listbox" tabindex="-1" aria-label="Filter by year filed" hidden></ul>
        </div>
      </div>

      <div class="field">
        <span class="field-label">Kind</span>
        <div class="kinds" role="group" aria-label="Filter by kind">
          <button type="button" data-kind="notice" aria-pressed="true">notice</button>
          <button type="button" data-kind="counternotice" aria-pressed="true">counter</button>
          <button type="button" data-kind="retraction" aria-pressed="true">retraction</button>
          <button type="button" data-kind="reversal" aria-pressed="true">reversal</button>
        </div>
      </div>

      <div class="field">
        <span class="field-label">Hand</span>
        <div class="fonts" role="group" aria-label="Notice typeface">
          <button type="button" data-val="script" aria-pressed="true">script</button>
          <button type="button" data-val="type" aria-pressed="false">type</button>
          <button type="button" data-val="serif" aria-pressed="false">serif</button>
        </div>
      </div>

      <div class="field">
        <span class="field-label">Marks</span>
        <div class="marks" role="group" aria-label="Markdown notation">
          <button type="button" data-val="hand" aria-pressed="true">hand</button>
          <button type="button" data-val="print" aria-pressed="false">print</button>
        </div>
      </div>

      <div class="field">
        <span class="field-label">View</span>
        <div class="views" role="group" aria-label="Result layout">
          <button type="button" data-val="list" aria-pressed="true">list</button>
          <button type="button" data-val="grid" aria-pressed="false">grid</button>
        </div>
      </div>
    </div>

    <div class="ledger-head" aria-hidden="true">
      <span>Filed</span>
      <span>Respondent</span>
      <span>Disposition</span>
    </div>
    <p class="count" id="count" role="status"></p>
    <ol class="results" id="results"></ol>
    <button class="more" id="more" hidden>disclose more records</button>
  </main>

  <footer id="foot">
    <noscript>This register requires JavaScript to search the index.</noscript>
  </footer>

  <svg class="visually-hidden" aria-hidden="true" focusable="false">
    <filter id="roughen">
      <feTurbulence type="fractalNoise" baseFrequency="0.016 0.04" numOctaves="4" seed="7" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="7"/>
    </filter>
  </svg>

  <script src="app.js"></script>
</body>
</html>
